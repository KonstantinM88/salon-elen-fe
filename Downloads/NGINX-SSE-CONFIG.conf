# ═══════════════════════════════════════════════════════════════
# NGINX — SSE CONFIGURATION FOR AI CHAT
# ═══════════════════════════════════════════════════════════════
#
# Add this location block to your Nginx config for permanent-halle.de
# INSIDE the existing server {} block, BEFORE the catch-all proxy_pass.
#
# Why: By default Nginx buffers proxy responses. SSE needs unbuffered
# streaming so text chunks reach the browser immediately.

location /api/ai/chat {
    proxy_pass http://127.0.0.1:3000;

    # Disable all buffering for SSE
    proxy_buffering off;
    proxy_cache off;

    # HTTP/1.1 required for chunked streaming
    proxy_http_version 1.1;
    proxy_set_header Connection '';

    # Disable chunked transfer encoding (SSE uses its own framing)
    chunked_transfer_encoding off;

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Longer timeout for GPT tool loops (can take 20-30s)
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

# ═══════════════════════════════════════════════════════════════
# VERIFICATION:
#
# After adding, test:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then test SSE from terminal:
#   curl -N -H "Content-Type: application/json" \
#     -d '{"sessionId":"test","message":"hi","locale":"de","stream":true}' \
#     https://permanent-halle.de/api/ai/chat
#
# You should see:
#   data: {"t":"d","c":"Hallo"}
#   data: {"t":"d","c":"! 👋"}
#   data: {"t":"d","c":" Wie kann"}
#   ...
#   data: {"t":"m","sessionId":"...","inputMode":null}
#
# If you see the whole response at once (not chunked), 
# proxy_buffering is still on somewhere.
# ═══════════════════════════════════════════════════════════════
